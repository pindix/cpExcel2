<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diluição | Mpindi TecMed</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    
    <!-- ============================================================ -->
    <!-- BARRA SUPERIOR - WEB STYLE                                 -->
    <!-- ============================================================ -->
    <header class="web-header">
        <!-- Card com os controles -->
        <div class="header-controls">
            <a href="../index.html#ferramentas" class="btn-icon" title="Início">
                <i class="ri-arrow-left-line"></i>
                <span>Início</span>
            </a>
            <span class="divider-header">|</span>
            <a href="../ajuda/index.html#diluicao" class="btn-icon" title="Ajuda">
                <i class="ri-question-line"></i>
                <span>Ajuda</span>
            </a>
            <span class="divider-header">|</span>
            <button class="btn-icon theme-toggle" id="themeBtn" title="Mudar Tema">
                <i class="ri-moon-line" id="themeIcon"></i>
                <span>Tema</span>
            </button>
        </div>

        <!-- Título da ferramenta -->
        <div class="header-title">
            <span class="tool-badge">Recosntituição</span>
        </div>
    </header>


    <section class="main-tool">

        <div class="calculator-box" data-aos="fade-up">

            <span class="nota-label">Apresentação do Frasco</span>
            <div class="campos-fundidos" id="caixa_mestre">
                <div class="sub-campo" style="position: relative;">
                    <input type="number" id="massa_valor" placeholder=" ">
                    <label>Massa</label>

                    <!-- Hidden input para manter compatibilidade -->
                    <input type="hidden" id="massa_unidade" value="mg">
                    
                    <!-- Componente personalizado -->
                    <div class="custom-select-diluicao" id="selectMassa">
                        <div class="custom-select-trigger-diluicao" onclick="toggleDiluicaoSelect('massa')">
                            <span class="unidade-texto" id="massaUnidadeSelecionada">mg</span>
                            <i class="ri-arrow-down-s-line unidade-arrow" id="massaUnidadeArrow"></i>
                        </div>
                        <div class="custom-select-options-diluicao" id="massaUnidadeOptions">
                            <!-- Opções geradas dinamicamente -->
                        </div>
                    </div>
                </div>
                <span class="divisor">/</span>
                <div class="sub-campo" style="position: relative;">
                    <input type="number" id="vol_valor" placeholder=" ">
                    <label>Capacidade</label>

                    <!-- Hidden input para manter compatibilidade -->
                    <input type="hidden" id="vol_unidade" value="ml">
                    
                    <!-- Componente personalizado -->
                    <div class="custom-select-diluicao" id="selectVolume">
                        <div class="custom-select-trigger-diluicao" onclick="toggleDiluicaoSelect('volume')">
                            <span class="unidade-texto" id="volumeUnidadeSelecionada">mL</span>
                            <i class="ri-arrow-down-s-line unidade-arrow" id="volumeUnidadeArrow"></i>
                        </div>
                        <div class="custom-select-options-diluicao" id="volumeUnidadeOptions">
                            <!-- Opções geradas dinamicamente -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="entradas_de_dados floating-group" style="margin-top: 20px; position: relative; padding-right: 0;">
                <i class="ri-syringe-line"></i>
                <input type="number" id="dose_indicada" placeholder=" ">
                <label class="label-flutuante">Dose Indicada (opcional)</label>
                
                <!-- Hidden input para manter compatibilidade -->
                <input type="hidden" id="dose_unidade" value="mg">
                
                <!-- Componente personalizado -->
                <div class="custom-select-diluicao" id="selectDose" style="z-index: 1;">
                    <div class="custom-select-trigger-diluicao" onclick="toggleDiluicaoSelect('dose')">
                        <span class="unidade-texto" id="doseUnidadeSelecionada">mg</span>
                        <i class="ri-arrow-down-s-line unidade-arrow" id="doseUnidadeArrow"></i>
                    </div>
                    <div class="custom-select-options-diluicao" id="doseUnidadeOptions">
                        <!-- Opções geradas dinamicamente -->
                    </div>
                </div>
            </div>



            <div class="caxa_de_botoes">
                <button class="botao" onclick="calcularDiluicao()">Calcular</button>
                <div id="limpador" onclick="limparDiluicao()">
                    <i class="ri-delete-bin-line"></i>
                </div>
            </div>
        </div>

        <div class="resultado-display" id="resultado" data-aos="fade-up" style="display: none;"></div>
    </section>

    <footer>
        <p><strong>Mpindi TecMed</strong></p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({duration: 800});</script>
    <script src="script.js"></script>
</body>
</html>
