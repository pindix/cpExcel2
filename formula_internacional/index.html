<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórmula Internacional | Mpindi TecMed</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>


    
    <!-- ============================================================ -->
    <!-- BARRA SUPERIOR - WEB STYLE                                 -->
    <!-- ============================================================ -->
    <header class="web-header">
        <!-- Card com os controles -->
        <div class="header-controls">
            <a href="../index.html#ferramentas" class="btn-icon" title="Início">
                <i class="ri-arrow-left-line"></i>
                <span>Início</span>
            </a>
            <span class="divider-header">|</span>
            <a href="../ajuda/index.html#internacional" class="btn-icon" title="Ajuda">
                <i class="ri-question-line"></i>
                <span>Ajuda</span>
            </a>
            <span class="divider-header">|</span>
            <button class="btn-icon theme-toggle" id="themeBtn" title="Mudar Tema">
                <i class="ri-moon-line" id="themeIcon"></i>
                <span>Tema</span>
            </button>
        </div>

        <!-- Título da ferramenta -->
        <div class="header-title">
            <span class="tool-badge">Fórmula Internacional</span>
        </div>
    </header>


     <section class="main-tool">
        
        
        <div class="calculator-box" data-aos="fade-up">
            
            <div class="container-campos">
                <div class="entradas_de_dados" style="grid-column: span 2;">
                    <i class="ri-scales-2-fill"></i>
                    <input type="number" placeholder="Peso..." id="peso">
                    <label class="label-flutuante">Peso</label>
                    <p>kg</p>
                </div>
                
                <!-- ============================================================ -->
                <!-- SELECT DE DOSAGEM - COMPONENTE PERSONALIZADO                  -->
                <!-- ============================================================ -->
                <div class="entradas_de_dados" style="grid-column: span 3; position: relative; padding-right: 0;" >
                    <i class="ri-capsule-line"></i>
                    <input type="number" placeholder="Dosagem..." id="dosagem">
                    <label class="label-flutuante">Dose</label>
                    
                    <!-- Hidden input para manter compatibilidade -->
                    <input type="hidden" id="unidade_de_dosagem" value="1">
                    
                    <!-- Componente personalizado -->
                    <div class="custom-select-unidade" id="selectDosagem">
                        <div class="custom-select-trigger-unidade" onclick="toggleUnidadeSelect('dosagem')">
                            <span class="unidade-texto" id="unidadeDosagemSelecionada">mg/kg</span>
                            <i class="ri-arrow-down-s-line unidade-arrow" id="unidadeDosagemArrow"></i>
                        </div>
                        <div class="custom-select-options-unidade" id="unidadeDosagemOptions">
                            <!-- Opções geradas dinamicamente pelo JavaScript -->
                        </div>
                    </div>
                </div>
                
                <!-- ============================================================ -->
                <!-- SELECT DE CONCENTRAÇÃO - COMPONENTE PERSONALIZADO            -->
                <!-- ============================================================ -->
                <div class="entradas_de_dados" style="grid-column: span 3; position: relative; padding-right: 0;">
                    <i class="ri-bubble-chart-line"></i>
                    <input type="number" placeholder=" " id="concentracao">
                    <label class="label-flutuante">Concentração</label>
                    
                    <!-- Hidden input para manter compatibilidade -->
                    <input type="hidden" id="unidade_de_concentracao" value="1">
                    
                    <!-- Componente personalizado -->
                    <div class="custom-select-unidade" id="selectConcentracao">
                        <div class="custom-select-trigger-unidade" onclick="toggleUnidadeSelect('concentracao')">
                            <span class="unidade-texto" id="unidadeConcentracaoSelecionada">mg/ml</span>
                            <i class="ri-arrow-down-s-line unidade-arrow" id="unidadeConcentracaoArrow"></i>
                        </div>
                        <div class="custom-select-options-unidade" id="unidadeConcentracaoOptions">
                            <!-- Opções geradas dinamicamente pelo JavaScript -->
                        </div>
                    </div>
                </div>
                <div class="entradas_de_dados" style="grid-column: span 2;">
                    <i class="ri-time-line"></i>
                    <input type="number" placeholder="Intervalo..." id="intervalo">
                    <label class="label-flutuante">Intervalo</label>
                    <p>h</p>
                </div>
                
                
            </div>
            
            
            
            <div class="caxa_de_botoes">
                <button class="botao" onclick="calcular()">Calcular</button>
                <i class="ri-delete-bin-line" id="limpador" onclick="limpar()"></i>
            </div>
            
        </div>
        <p class="resultado-display" id="resultado" data-aos="fade-up" data-aos-delay="100"></p>
        
        
    </section>

  
    <footer>
        <p><strong>Mpindi TecMed</strong></p>
    </footer>

    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
  AOS.init({
    duration: 1000,
    once: true
  });
</script>
</body>
</html>
