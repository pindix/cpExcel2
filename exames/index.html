<!DOCTYPE html>
<html lang="pt-pt">
<head>
    
    
    <style>
    /* Tema inline para evitar flash branco */
    :root {
        --bg-inline: white;
        --text-inline: #1a2a21;
    }
    
    [data-theme="dark"] {
        --bg-inline: black;
        --text-inline: white;
    }
    
    /* Aplica o fundo imediatamente */
    html {
        background-color: var(--bg-inline);
    }
    
    body {
        background-color: var(--bg-inline);
        color: var(--text-inline);
    }
    
    /* Força o fundo antes do JS carregar */
    body::before {
        display: none;
    }
</style>

<script>
    // Ler tema do localStorage ANTES do CSS carregar
    (function() {
        const tema = localStorage.getItem('tema');
        if (tema === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.body.setAttribute('data-theme', 'dark');
        }
    })();
</script> 
    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioquímica | MatClínica</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- ==========================================
   FAVICON (Usando o logo da MatClínica)
=========================================== -->
<link rel="icon" type="image/png" sizes="32x32" href="assets/imagens/logo.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/imagens/logo.png">
<link rel="apple-touch-icon" href="assets/imagens/logo.png">
    
    
    
</head>
<body>

    <nav>
        <a href="../index.html" class="btn-back">
            <i class="ri-arrow-left-line"></i> Início
        </a>
        <a href="../ajuda/index.html#exames" class="help-icon" title="Como funciona?">
            <i class="ri-question-line"></i> 
        </a>
        <button class="theme-toggle" id="themeBtn"> 
            <i class="ri-moon-line" id="themeIcon"></i>
        </button>
    </nav>




    <section class="main-tool">
        <div class="tool-header">
            <span>BIOQUÍMICA & LABORATÓRIO</span>
            <h2>Interpretador de Exames</h2>
        </div>

        <div class="calculator-box" data-aos="fade-up">
            <div class="entradas_de_dados" style="position: relative;">
                <i class="ri-search-eye-line"></i>
                <input type="text" id="exame_nome" placeholder=" " oninput="filtrarExames()" autocomplete="off">
                <label class="label-flutuante">Nome do exame</label>
                <div id="sugestoes_box" class="sugestoes-box"></div>
            </div>

            <div class="entradas_de_dados" style="position: relative; margin-top: 25px;">
                <i class="ri-ruler-2-line"></i>
                <input type="number" step="0.01" id="exame_valor" placeholder=" ">
                <label class="label-flutuante">Valor do resultado</label>
                <p class="unidade-tag" id="unidade_display">--</p>
            </div>

            <div class="caxa_de_botoes">
                <button class="botao" onclick="analisar()">Analisar</button>
                <i class="ri-delete-bin-line" id="limpador" onclick="limpar()"></i>
            </div>
        </div>

        <p class="resultado-display" id="resultado" data-aos="fade-up"></p>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({duration: 800});</script>
    <script src="script.js"></script>

</html>
